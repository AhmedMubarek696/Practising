<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="Author" content="Ahmed Mohammed">
        <meta name="Description" content="Form data">
        <title>Forms</title>
        <link rel="icon" href="img/HTML_Logo.png" type="image/x-icon">
        <link rel="stylesheet" href="main.CSS" type="text/CSS">
    </head>
    <body>
        <header>
            <h1>Forms</h1>
            <nav aria-label="menu-c">
                <h2>Navigation C</h2>
                <ul>
                    <li><a href="#form-a">Form A</a></li>

                </ul>
            </nav>
            <hr>
            <hr>
        </header>
        <main>
            <section id="form-a">
                <h2>Form A</h2>
                <p>Add your data here</p>
                    
                <form action="https://httpbin.org/get" method="get">
                    <fieldset>
                        <legend>Single Text</legend>
                            
                        <p>
                            <label for="firstName">First Name:</label>
                            <input type="text" name="firstName" id="firstName" placeholder="Ahmed" required autofocus> <br>
                        </p>

                        <p>
                            <label for="lastName">Last Name:</label>
                            <input type="text" name="lastName" id="lastName" placeholder="Mohammed" required > <br>
                        </p>

                        <p>
                            <label for="password">Password:</label>
                            <input type="password" name="password" id="password" placeholder="Password" required> <br>
                        </p>

                        <p>
                            <label for="phone">Phone:</label>
                            <input type="tel" name="phone" id="phone" placeholder="555-555-55555" pattern="[0-9]{3}[0-9]{3}[0-9]{5}" required> <br>
                        </p>
                            
                    </fieldset>
                    <br>

                    <fieldset>
                        <legend>Numeric List</legend>

                        <p>
                            <label for="listA">Favorite Decade:</label>
                            <input type="number" name="listA" id="listA" min="1950" max="2020" step="10" value="1980">
                        </p>
                            
                    </fieldset>
                    <br>

                    <fieldset>
                        <legend>Data List</legend>

                        <p>
                            <label for="listB"> List B:</label>
                            <input type="text" name="listB" id="listB" list="listValueB">
                            <datalist id="listValueB">
                                <option value="Value 1">Value 1</option>
                                <option value="Value 2">Value 2</option>
                                <option value="Value 3">Value 3</option>
                                <option value="Value 4">Value 4</option>
                                <option value="Value 5">Value 5</option>
                                <option value="Value 6">Value 6</option>
                            </datalist>
                        </p>
                    </fieldset>
                    <br>

                    <fieldset>
                        <legend>Select List</legend>

                        <p>
                            <label for="listC">List C:</label>
                            <select name="listC" id="listC" multiple size="5">
                                <optgroup label="Group A">
                                    <option value="value A1" selected>Value A1</option>
                                    <option value="value A2">Value A2</option>
                                    <option value="value A3">Value A3</option>
                                </optgroup>

                                <optgroup label="Group B">
                                    <option value="value B1">Value B1</option>
                                    <option value="value B2">Value B2</option>
                                    <option value="value B3">Value B3</option>
                                </optgroup>
                                    <option value="others">Others</option>

                            </select>
                        </p>
                    </fieldset>
                    <br>

                    <fieldset>
                        <legend>RAdio Button</legend>

                        <p>
                            <label for="radioA1"> Radio A1</label>
                            <input type="radio" name="radioA" id="radioA1" value="Radio A1">
                        </p>

                        <p>
                            <label for="radioA2"> Radio A2</label>
                            <input type="radio" name="radioA" id="radioA2" value="Radio A2">
                        </p>

                        <p>
                            <label for="radioA3"> Radio A3</label>
                            <input type="radio" name="radioA" id="radioA3" value="Radio A3">
                        </p>

                    </fieldset>
                    <br>

                    <fieldset>
                        <legend>Free Text Note</legend>

                        <p>
                            <label for="noteA">Note A</label>
                            <textarea name="noteA" id="noteA" cols="40" rows="10" placeholder="Write your note here..."></textarea>
                        </p>
                    </fieldset>
                    <br>

                    <button type="submit">Submit</button>
                    <button type="submit" formaction="https://httpbin.org/post" formmethod="post">Post</button>
                    <button type="reset">Reset</button>
                </form>
                <hr>
                <hr>
            </section>
        </main>
        <footer>
            <a href="index.html">Main Page</a> <br>
            <a href="me.html">Me</a> <br>
            <a href="Tables.html">Schedules</a> <br>
            &lt;&lt;&lt;&copy;Ahmed Mohammed&gt;&gt;&gt;
        </footer>
    </body>
</html>
